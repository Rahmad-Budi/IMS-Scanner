<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Material - IMS SEI RAYA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f5f5f5; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <iframe id="imsFrame" src=""></iframe>

    <script>
        // 1. Ambil parameter '?id=xxxx' dari URL browser saat QR Code di-scan
        const urlParams = new URLSearchParams(window.location.search);
        const materialId = urlParams.get('id');
        
        // 2. Tembakkan langsung ke URL Exec Google Apps Script milikmu
        let googleWebAppUrl = "https://script.google.com/macros/s/AKfycbyYDB7_W0XaIocBytq67NBw3Of4tL-17R7vvJg6Zme8eCtPBp56ge5HSxQ6KGB2Q_7K0Q/exec";
        
        // 3. Jika ID material ada, gabungkan lalu muat di dalam iframe
        if (materialId) {
            document.getElementById('imsFrame').src = googleWebAppUrl + "?id=" + materialId;
        } else {
            document.body.innerHTML = "<h3 style='text-align:center; margin-top:50px; font-family:Arial, sans-serif;'>Error: ID Material Tidak Ditemukan!</h3>";
        }
    </script>
</body>
</html>
